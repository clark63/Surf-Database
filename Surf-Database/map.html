<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwellCast — Where Are You?</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ocean:      #071e2e;
    --land:       #1a4a6b;
    --land-stroke:rgba(38,196,154,0.35);
    --tide:       #1a8c6e;
    --tide-light: #26c49a;
    --epic:       #00e5b4;
    --text:       #e8f4f0;
    --muted:      #7a9bb5;
    --border:     rgba(26,140,110,0.3);
    --panel-bg:   rgba(5,17,31,0.97);
  }
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; }
  body { background:var(--ocean); color:var(--text); font-family:'DM Sans',sans-serif; display:flex; flex-direction:column; }

  /* ── Header ── */
  header {
    z-index:20; flex-shrink:0;
    padding:0.85rem 1.5rem;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:0.5px solid var(--border);
    background:var(--panel-bg);
  }
  .logo-title { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; letter-spacing:0.06em; line-height:1; }
  .logo-title span { color:var(--tide-light); }
  .header-prompt { font-family:'DM Mono',monospace; font-size:0.62rem; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; }

  /* ── Layout: map + side drawer side by side ── */
  #layout { flex:1; display:flex; overflow:hidden; position:relative; }

  /* ── Map area ── */
  #map-wrap { flex:1; position:relative; overflow:hidden; transition:flex 0.35s ease; }
  #world-svg { width:100%; height:100%; display:block; }
  .graticule { fill:none; stroke:rgba(38,196,154,0.08); stroke-width:0.5; }
  .country   { fill:var(--land); stroke:var(--land-stroke); stroke-width:0.5; }
  .sphere    { fill:var(--ocean); }

  /* ── Side drawer — hidden until region selected ── */
  #side-drawer {
    width:0; overflow:hidden;
    border-left:0.5px solid var(--border);
    background:var(--panel-bg);
    transition:width 0.35s ease;
    display:flex; flex-direction:column;
    flex-shrink:0;
  }
  #side-drawer.open { width:340px; }

  .drawer-header {
    padding:1.25rem 1.25rem 0.9rem;
    border-bottom:0.5px solid var(--border);
    flex-shrink:0;
  }
  .drawer-region {
    font-family:'Bebas Neue',sans-serif;
    font-size:2rem; letter-spacing:0.05em; line-height:1;
    color:var(--text);
  }
  .drawer-sub {
    font-family:'DM Mono',monospace;
    font-size:0.6rem; color:var(--muted);
    letter-spacing:0.1em; text-transform:uppercase; margin-top:4px;
  }

  /* Scrollable beach preview list */
  #beach-list {
    flex:1; overflow-y:auto; padding:0.85rem;
    display:flex; flex-direction:column; gap:8px;
  }
  #beach-list::-webkit-scrollbar { width:3px; }
  #beach-list::-webkit-scrollbar-track { background:transparent; }
  #beach-list::-webkit-scrollbar-thumb { background:rgba(26,140,110,0.3); border-radius:2px; }

  /* Beach preview card */
  .beach-preview {
    background:rgba(13,45,71,0.6);
    border:0.5px solid rgba(26,140,110,0.2);
    border-radius:10px; padding:10px 12px;
    display:flex; align-items:center; gap:10px;
  }
  .preview-info { flex:1; min-width:0; }
  .preview-name {
    font-family:'Bebas Neue',sans-serif;
    font-size:1.1rem; letter-spacing:0.04em; line-height:1;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .preview-country {
    font-family:'DM Mono',monospace;
    font-size:0.58rem; color:var(--muted);
    letter-spacing:0.07em; text-transform:uppercase; margin-top:2px;
  }
  /* Skeleton shimmer while loading */
  .preview-loading {
    height:10px; border-radius:4px;
    background:linear-gradient(90deg, rgba(26,140,110,0.12) 25%, rgba(26,140,110,0.22) 50%, rgba(26,140,110,0.12) 75%);
    background-size:200% 100%;
    animation:shimmer 1.4s infinite;
    margin-top:5px;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  .preview-badge {
    font-family:'Bebas Neue',sans-serif;
    font-size:0.85rem; letter-spacing:0.07em;
    padding:3px 9px; border-radius:12px;
    border:1.2px solid; flex-shrink:0;
    min-width:48px; text-align:center;
  }
  .preview-score {
    font-family:'DM Mono',monospace;
    font-size:0.6rem; color:var(--muted);
    letter-spacing:0.05em; text-align:right; flex-shrink:0;
  }

  /* Go button */
  .drawer-footer {
    padding:0.85rem 1.25rem;
    border-top:0.5px solid var(--border);
    flex-shrink:0;
  }
  #go-btn {
    width:100%; padding:11px;
    border-radius:9px; border:none; cursor:pointer;
    background:var(--tide);
    font-family:'Bebas Neue',sans-serif;
    font-size:1.15rem; letter-spacing:0.1em; color:var(--text);
    transition:background 0.15s, transform 0.1s;
  }
  #go-btn:hover  { background:var(--tide-light); transform:scale(1.02); }
  #go-btn:active { transform:scale(0.98); }

  /* ── Pins ── */
  .pin-group { cursor:pointer; }
  .pin-pulse {
    fill:none; stroke:rgba(38,196,154,0.4); stroke-width:1.2;
    pointer-events:none; animation:ripple 2.6s ease-out infinite;
  }
  @keyframes ripple { 0%{r:7;stroke-opacity:0.6} 100%{r:22;stroke-opacity:0} }

  .pin-bg   { fill:rgba(26,140,110,0.2); stroke:rgba(38,196,154,0.7); stroke-width:1.2; transition:fill 0.12s,stroke 0.12s; }
  .pin-dot  { fill:#26c49a; transition:fill 0.12s; }
  .pin-label {
    font-family:'DM Mono',monospace; font-size:8.5px;
    fill:rgba(200,230,225,0.9);
    paint-order:stroke; stroke:#071e2e; stroke-width:3px; stroke-linejoin:round;
    pointer-events:none;
  }
  .pin-group.hovered  .pin-bg  { fill:rgba(38,196,154,0.28); stroke:#26c49a; stroke-width:1.5; }
  .pin-group.hovered  .pin-dot { fill:#fff; }
  .pin-group.hovered  .pin-label { fill:#fff; }
  .pin-group.selected .pin-bg  { fill:rgba(38,196,154,0.35); stroke:#00e5b4; stroke-width:2; }
  .pin-group.selected .pin-dot { fill:#fff; }
  .pin-group.selected .pin-label { fill:#fff; }

  /* ── Tooltip (brief, just region name) ── */
  #tooltip {
    position:fixed; z-index:200; display:none; pointer-events:none; white-space:nowrap;
    background:rgba(5,17,31,0.97); border:0.5px solid rgba(38,196,154,0.5); border-radius:7px;
    padding:6px 12px; font-family:'DM Mono',monospace; font-size:0.65rem; color:var(--tide-light); letter-spacing:0.05em;
  }

  /* Loading overlay */
  #map-loading {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:var(--ocean); z-index:5;
    font-family:'DM Mono',monospace; font-size:0.7rem; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase;
  }

  /* ── Hint bar at bottom of map (before anything selected) ── */
  #hint-bar {
    position:absolute; bottom:0; left:0; right:0; z-index:10;
    padding:10px 1.5rem; text-align:center;
    font-family:'DM Mono',monospace; font-size:0.63rem; color:var(--muted);
    letter-spacing:0.08em; text-transform:uppercase;
    background:linear-gradient(transparent, rgba(5,17,31,0.7));
    pointer-events:none; transition:opacity 0.3s;
  }
  #hint-bar.hidden { opacity:0; }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo-title">SWELL<span>CAST</span></div>
  </div>
  <div class="header-prompt">Click a region to explore surf spots</div>
</header>

<div id="layout">
  <div id="map-wrap">
    <svg id="world-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="map-loading">Loading world map…</div>
    <div id="hint-bar">Click any pin to explore surf spots in that region</div>
  </div>

  <!-- Side drawer — slides in when region selected -->
  <div id="side-drawer">
    <div class="drawer-header">
      <div class="drawer-region" id="drawer-region-name"></div>
      <div class="drawer-sub" id="drawer-sub">— surf spots</div>
    </div>
    <div id="beach-list"></div>
    <div class="drawer-footer">
      <button id="go-btn" onclick="goToDashboard()">View Live Conditions →</button>
    </div>
  </div>
</div>

<div id="tooltip"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script src="ocean-api.js"></script>
<script>

let selectedRegionId = null, selectedRegionName = null;
let projection = null;
const tooltip = document.getElementById('tooltip');

const LABEL_OFFSET = {
  "hawaii":            [  0,  23],
  "california":        [-14,  17],
  "pacific-nw":        [-14,  17],
  "east-coast-us":     [ 14,  17],
  "mexico":            [  0,  23],
  "central-america":   [  0,  23],
  "south-america-pac": [-14,  17],
  "brazil":            [ 14,  17],
  "uk-ireland":        [-14,  17],
  "europe-atlantic":   [  0,  23],
  "morocco":           [  0,  23],
  "canaries":          [  0,  23],
  "south-africa":      [  0,  23],
  "australia-east":    [ 14,  17],
  "australia-west":    [-14,  17],
  "indonesia":         [  0,  23],
  "japan":             [ 14,  17],
};

// ── Build map ─────────────────────────────────────────────────────
async function buildMap() {
  const svg  = d3.select('#world-svg');
  const wrap = document.getElementById('map-wrap');
  const W    = wrap.clientWidth  || 960;
  const H    = wrap.clientHeight || 500;

  svg.attr('viewBox',`0 0 ${W} ${H}`).attr('width',W).attr('height',H);

  projection = d3.geoNaturalEarth1()
    .scale(W / 6.1)
    .translate([W / 2, H / 2 + 20]);

  const path = d3.geoPath().projection(projection);

  svg.append('path').datum({type:'Sphere'}).attr('class','sphere').attr('d',path);
  svg.append('path').datum(d3.geoGraticule().step([30,30])()).attr('class','graticule').attr('d',path);

  let world;
  try {
    world = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
  } catch(e) {
    document.getElementById('map-loading').textContent = 'Map unavailable — check connection';
    return;
  }

  svg.selectAll('.country')
     .data(topojson.feature(world, world.objects.countries).features)
     .enter().append('path').attr('class','country').attr('d',path);

  // Draw pins
  REGIONS.forEach((region, ri) => {
    const coords = projection([region.lng, region.lat]);
    if (!coords || isNaN(coords[0])) return;
    const [px, py] = coords;
    const beaches  = getBeachesForRegion(region.id);
    const offset   = LABEL_OFFSET[region.id] || [0, 23];

    const g = svg.append('g')
      .attr('class','pin-group')
      .attr('data-region', region.id)
      .attr('transform',`translate(${px.toFixed(1)},${py.toFixed(1)})`);

    g.append('circle').attr('class','pin-pulse').attr('r',7)
     .style('animation-delay', `${ri * 0.14}s`);
    g.append('circle').attr('class','pin-bg').attr('r',10);
    g.append('circle').attr('class','pin-dot').attr('r',4);
    g.append('text')
     .attr('class','pin-label')
     .attr('x', offset[0]).attr('y', offset[1])
     .attr('text-anchor', offset[0] < -4 ? 'end' : offset[0] > 4 ? 'start' : 'middle')
     .text(region.label);

    g.on('mouseenter', function(event) {
        if (!this.classList.contains('selected')) this.classList.add('hovered');
        tooltip.textContent = region.label + ' — ' + beaches.length + ' spots';
        tooltip.style.display = 'block';
      })
     .on('mousemove', function(event) {
        tooltip.style.left = (event.clientX + 14) + 'px';
        tooltip.style.top  = (event.clientY - 36) + 'px';
      })
     .on('mouseleave', function() {
        this.classList.remove('hovered');
        tooltip.style.display = 'none';
      })
     .on('click', function() {
        selectRegion(region.id, region.label, beaches);
      });
  });

  document.getElementById('map-loading').style.display = 'none';
}

// ── Select region → open drawer ───────────────────────────────────
function selectRegion(regionId, regionName, beaches) {
  selectedRegionId   = regionId;
  selectedRegionName = regionName;

  // Pin states
  document.querySelectorAll('.pin-group').forEach(p => p.classList.remove('selected','hovered'));
  const sel = document.querySelector(`.pin-group[data-region="${regionId}"]`);
  if (sel) sel.classList.add('selected');

  // Hide hint
  document.getElementById('hint-bar').classList.add('hidden');

  // Populate drawer header
  document.getElementById('drawer-region-name').textContent = regionName;
  document.getElementById('drawer-sub').textContent = `${beaches.length} surf spot${beaches.length !== 1 ? 's' : ''}`;

  // Show skeleton cards immediately
  const list = document.getElementById('beach-list');
  list.innerHTML = beaches.map((b, i) => `
    <div class="beach-preview" id="prev-${i}">
      <div class="preview-info">
        <div class="preview-name">${b.name}</div>
        <div class="preview-country">${b.country}</div>
        <div class="preview-loading" style="width:${60 + Math.random()*30}%"></div>
      </div>
      <div class="preview-score" id="score-${i}">—</div>
      <div class="preview-badge" id="badge-${i}" style="color:var(--muted);border-color:var(--muted);background:transparent">—</div>
    </div>
  `).join('');

  // Open drawer
  document.getElementById('side-drawer').classList.add('open');

  // Fetch live conditions for each beach and update cards
  beaches.forEach((beach, i) => {
    fetchBeachPreview(beach, i);
  });
}

// ── Fetch a single beach for the preview card ─────────────────────
async function fetchBeachPreview(beach, idx) {
  try {
    const url = `https://marine-api.open-meteo.com/v1/marine?${new URLSearchParams({
      latitude:beach.lat, longitude:beach.lng,
      hourly:'wave_height,wave_period,swell_wave_height,swell_wave_period,wind_wave_height',
      timezone:'auto', forecast_days:1,
    })}`;
    const res  = await fetch(url);
    const data = await res.json();
    const h    = data.hourly;

    // Find current hour index
    const now   = new Date();
    const times = h.time;
    let ci = 0;
    for (let i = 0; i < times.length; i++) { if (new Date(times[i]) <= now) ci = i; else break; }

    const waveH     = h.wave_height[ci]     || 0;
    const wavePer   = h.wave_period ? h.wave_period[ci] : (h.swell_wave_period ? h.swell_wave_period[ci] : 0);
    const windWaveH = h.wind_wave_height[ci] || 0;
    const swellH    = h.swell_wave_height[ci]|| 0;
    const swellPer  = h.swell_wave_period[ci]|| 0;

    // Compute score
    const score = surfRating(waveH, wavePer, windWaveH);
    const rating = ratingLabel(score);

    // Update card
    const scoreEl = document.getElementById(`score-${idx}`);
    const badgeEl = document.getElementById(`badge-${idx}`);
    const prevEl  = document.getElementById(`prev-${idx}`);

    if (scoreEl) scoreEl.innerHTML = `${waveH.toFixed(1)}m &nbsp; ${swellPer.toFixed(0)}s`;
    if (badgeEl) {
      badgeEl.textContent = rating.label;
      badgeEl.style.color        = rating.color;
      badgeEl.style.borderColor  = rating.border;
      badgeEl.style.background   = rating.bg;
    }
    if (prevEl) {
      // Replace shimmer with real sub-info
      const shimmer = prevEl.querySelector('.preview-loading');
      if (shimmer) shimmer.remove();
      const infoEl = prevEl.querySelector('.preview-info');
      const sub = document.createElement('div');
      sub.className = 'preview-country';
      sub.style.marginTop = '3px';
      sub.textContent = `${beach.country}`;
      infoEl.appendChild(sub);
    }
  } catch(e) {
    const badgeEl = document.getElementById(`badge-${idx}`);
    if (badgeEl) { badgeEl.textContent = '—'; }
  }
}

// ── Navigate to dashboard ─────────────────────────────────────────
function goToDashboard() {
  if (!selectedRegionId) return;
  window.location.href =
    `dashboard.html?region=${encodeURIComponent(selectedRegionId)}&regionName=${encodeURIComponent(selectedRegionName)}`;
}

buildMap();
</script>
</body>
</html>
